name: build-win-release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. win-test-20260419"
        required: true
        default: "win-test-manual"
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          npm install

      - name: Prepare static dist
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          if (Test-Path src) {
            Copy-Item src\* dist -Recurse -Force
          }

          if (!(Test-Path dist)) {
            Write-Error "dist folder missing"
            exit 1
          }

          Write-Host "Prepared dist:"
          Get-ChildItem dist -Recurse

      - name: Prepare bundled backend resources
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          if (!(Test-Path bundle)) {
            Write-Error "bundle folder missing"
            exit 1
          }
          Get-ChildItem bundle -Recurse

      - name: Debug bundle tree
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          Write-Host "PWD:"
          Get-Location
          Write-Host "bundle tree:"
          if (Test-Path bundle) {
            Get-ChildItem bundle -Recurse | Select-Object -First 10 Name, Length
          } else {
            Write-Error "bundle folder missing"
            exit 1
          }
          Write-Host "src-tauri tree:"
          Get-ChildItem src-tauri -Recurse | Select-Object -First 10 Name, Length

      - name: Build Tauri Windows bundle
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          if (!(Test-Path dist)) {
            Write-Error "dist folder missing before tauri build"
            exit 1
          }
          Write-Host "dist ready, starting tauri build..."
          npm run tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-win | Out-Null
          $paths = @(
            "core-platform/apps/desktop/src-tauri/target/release/bundle/msi/*.msi",
            "core-platform/apps/desktop/src-tauri/target/release/bundle/nsis/*.exe",
            "core-platform/apps/desktop/src-tauri/target/release/*.exe"
          )
          foreach ($p in $paths) {
            Get-ChildItem $p -ErrorAction SilentlyContinue | Copy-Item -Destination dist-win -Force
          }
          Get-ChildItem dist-win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-ai-platform-win
          path: dist-win/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: dist-win/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
