name: build-win-release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Build label, e.g. win-d7-c1"
        required: false
        default: "win-artifact-only"
  push:
    branches: [ "main" ]
    paths:
      - "core-platform/apps/desktop/**"
      - ".github/workflows/build-win-release.yml"

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Show commit and tree
        shell: pwsh
        run: |
          git rev-parse HEAD
          git log -1 --oneline
          Get-ChildItem core-platform/apps/desktop/src -Recurse | Select-Object -First 100 FullName, Length

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          npm install

      - name: Prepare frontend dist from latest source
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item src\* dist -Recurse -Force

          $sha = git rev-parse --short HEAD
          $time = Get-Date -Format o
          $meta = @{
            commit = $sha
            built_at = $time
            workflow = "build-win-release"
            label = "${{ github.event.inputs.tag_name }}"
          } | ConvertTo-Json
          Set-Content -Path dist\BUILD_INFO.json -Value $meta -Encoding UTF8

          if (!(Test-Path dist\index.html)) {
            throw "dist/index.html missing"
          }
          if (!(Test-Path dist\js)) {
            throw "dist/js missing"
          }

          Write-Host "Prepared dist from latest source:"
          Get-ChildItem dist -Recurse | Select-Object -First 150 FullName, Length
          Write-Host "BUILD_INFO:"
          Get-Content dist\BUILD_INFO.json

      - name: Verify D7-C1 UI changes are in dist
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          if (!(Select-String -Path dist\index.html -Pattern "hidden-internal" -Quiet)) {
            throw "D7-C1 hidden-internal marker not found in dist/index.html; Windows package would be old"
          }
          if (!(Test-Path dist\js\auto-start-services.js)) {
            throw "auto-start-services.js missing from dist; Windows package would be old"
          }
          Write-Host "D7-C1 markers verified in dist."

      - name: Debug Tauri config
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          Get-Content src-tauri\tauri.conf.json

      - name: Build Tauri Windows bundle
        working-directory: ./core-platform/apps/desktop
        shell: pwsh
        run: |
          npm run tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-win | Out-Null
          $paths = @(
            "core-platform/apps/desktop/src-tauri/target/release/bundle/msi/*.msi",
            "core-platform/apps/desktop/src-tauri/target/release/bundle/nsis/*.exe",
            "core-platform/apps/desktop/src-tauri/target/release/*.exe"
          )
          foreach ($p in $paths) {
            Get-ChildItem $p -ErrorAction SilentlyContinue | Copy-Item -Destination dist-win -Force
          }

          Copy-Item "core-platform/apps/desktop/dist/BUILD_INFO.json" -Destination dist-win -Force

          Write-Host "Collected Windows artifacts:"
          Get-ChildItem dist-win | Select-Object FullName, Length

          if (!(Get-ChildItem dist-win -ErrorAction SilentlyContinue)) {
            throw "No Windows artifacts collected"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-ai-platform-win
          path: dist-win/*
          if-no-files-found: error
