    body { font-family: -apple-system, sans-serif; padding: 20px; }
    .service-card {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
    }
    .service-card.ok { border-color: #dcfce7; background: #f0fdf4; }
    .service-card.bad { border-color: #fee2e2; background: #fef2f2; }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 99px;
      margin-right: 6px;
    }
    .dot.ok { background: #16a34a; }
    .dot.bad { background: #dc2626; }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e8f0fe;
      color: #174ea6;
      font-size: 12px;
      font-weight: 800;
      margin: 2px 4px 2px 0;
    }
    .badge-enterprise { background: #dbeafe; color: #1e40af; }
    .badge-partial { background: #fef3c7; color: #92400e; }
    .badge-required { background: #fee2e2; color: #991b1b; }
    .mono { font-family: ui-monospace, monospace; }
  </style>
</head>

async function testServices() {
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "<p>Checking services...</p>";
  
  const results = [];
  for (const service of CORE_SERVICES) {
    try {
      const res = await fetch(`http://127.0.0.1:${service.port}/health`, { signal: AbortSignal.timeout(2000) });
      const json = await res.json();
      results.push({
        ...service,
        ok: json.ok === true,
        version: json.version || "unknown",
        detail: json
      });
    } catch (e) {
      results.push({
        ...service,
        ok: false,
        version: "unknown",
        error: e.message
      });
    }
  }
  
  const enterpriseCount = results.filter(x => x.tier === "enterprise" && x.ok).length;
  const enterpriseTotal = results.filter(x => x.tier === "enterprise").length;
  const okCount = results.filter(x => x.ok).length;
  
  let html = `
    <h2>Summary: ${okCount}/${results.length} services (${enterpriseCount}/${enterpriseTotal} enterprise)</h2>
  `;
  
  for (const s of results) {
    const tierBadge = s.tier === "enterprise" ? 
      `<span class="badge badge-enterprise">ENT</span>` : 
      s.tier === "partial" ? 
      `<span class="badge badge-partial">PART</span>` : "";
    
    const requiredBadge = s.required ? 
      `<span class="badge badge-required">REQ</span>` : "";
    
    html += `
      <div class="service-card ${s.ok ? 'ok' : 'bad'}">
        <div>
          <strong>${s.name}</strong> <span class="mono">${s.port}</span><br/>
          ${tierBadge}${requiredBadge}
          ${s.ok && s.version !== "unknown" ? `<span class="mono">v${s.version}</span>` : ""}
        </div>
        <div style="margin-top: 8px; font-size: 12px; color: #666;">
          ${s.role}${s.note ? ` (${s.note})` : ""}
        </div>
        ${!s.ok && s.error ? `<div class="mono" style="margin-top: 4px; color: #dc2626;">Error: ${s.error}</div>` : ""}
      </div>
    `;
  }
  
  resultsDiv.innerHTML = html;
}
