<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Team Video Render</title>
  <style>
    html, body {
      margin:0; padding: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .frame {
      width:100vw; height:100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 64px; box-sizing: border-box;
    }
    .card {
      width: 88%; max-width: 1200px; background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15); border-radius: 28px;
      padding: 48px; box-sizing: border-box; backdrop-filter: blur(8px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    h1 { font-size: 56px; margin: 0 0 16px; line-height: 1.15; }
    h2 { font-size: 28px; font-weight: 500; opacity: 0.9; margin: 0 0 28px; }
    ul { margin: 0; padding-left: 28px; font-size: 28px; line-height: 1.7; }
    li { margin: 10px 0; }
    .footer { margin-top: 28px; font-size: 18px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <h1>Agent Team Video Render</h1>
      <h2>测试任务:帮我搜索并整理 A股市场动态,然后渲染成模板视频</h2>
      <ul>
        <li>由 Agent Team Operator 触发</li><li>调用 HyperFrames 模板</li><li>可接研究 / tts / charts</li>
      </ul>
      <div class="footer">Generated by Local AI Platform / HyperFrames Batch 2</div>
    </div>
  </div>
</body>
</html>
