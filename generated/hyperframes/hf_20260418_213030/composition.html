<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Asset Render</title>
  <script src="./vendor/gsap.min.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px; box-sizing: border-box;
      page-break-after: always;
    }
    .card {
      width: 88%; max-width: 1200px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 28px;
      padding: 48px;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    .meta {
      font-size: 16px; opacity: 0.7; margin-bottom: 14px;
    }
    h1 {
      font-size: 52px; line-height: 1.15; margin: 0 0 12px;
    }
    h2 {
      font-size: 26px; font-weight: 500; opacity: 0.9; margin: 0 0 22px;
    }
    .subtitle-line {
      font-size: 22px;
      color: #cbd5e1;
      margin: 0 0 20px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
    }
    ul {
      margin: 0; padding-left: 28px;
      font-size: 28px; line-height: 1.7;
    }
    li { margin: 10px 0; }
    .footer {
      margin-top: 28px; font-size: 18px; opacity: 0.7;
    }
  </style>
</head>
<body>
  
        <section class="page">
          <div class="card">
            <div class="meta">Page 1 / 2</div>
            <h1>Offline Asset Render</h1>
            <h2>Phase 2 Step 2</h2>
            <div class="subtitle-line">第一页：市场概览</div>
            <ul>
              <li>市场震荡</li><li>科技活跃</li><li>成交额放大</li>
            </ul>
            <div class="footer">Generated by Local AI Platform / HyperFrames Batch 3</div>
          </div>
        </section>
        
        <section class="page">
          <div class="card">
            <div class="meta">Page 2 / 2</div>
            <h1>Offline Asset Render</h1>
            <h2>Phase 2 Step 2</h2>
            <div class="subtitle-line">第二页：结构亮点</div>
            <ul>
              <li>资金偏好回升</li><li>成长方向受关注</li><li>风格切换仍在继续</li>
            </ul>
            <div class="footer">Generated by Local AI Platform / HyperFrames Batch 3</div>
          </div>
        </section>
        
</body>
</html>
