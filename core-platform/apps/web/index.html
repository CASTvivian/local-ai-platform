<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local AI Platform</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: #e2e8f0;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #020617;
      color: #e2e8f0;
      padding: 12px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background: #2563eb;
      border: none;
      font-weight: 600;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #020617;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      overflow-x: auto;
    }
    .row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 12px;
      align-items: center;
    }
    h1, h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Local AI Platform</h1>

    <div class="card">
      <h2>Ask</h2>
      <div class="row">
        <label for="taskType">Task Type</label>
        <select id="taskType">
          <option value="general">general</option>
          <option value="code">code</option>
        </select>
      </div>

      <label for="prompt">Prompt</label>
      <textarea id="prompt" rows="8" placeholder="输入你的问题，包含 echo / plugin / tool 会自动走插件链路"></textarea>

      <button id="sendBtn">发送</button>

      <h3>Response</h3>
      <pre id="responseBox">等待请求...</pre>
    </div>

    <div class="card">
      <h2>Recent Task Runs</h2>
      <button id="refreshRunsBtn">刷新记录</button>
      <pre id="runsBox">等待加载...</pre>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:18081";
    const EVAL_BASE = "http://127.0.0.1:18083";

    async function sendAsk() {
      const taskType = document.getElementById("taskType").value;
      const prompt = document.getElementById("prompt").value;
      const responseBox = document.getElementById("responseBox");

      responseBox.textContent = "请求中...";

      try {
        const res = await fetch(`${API_BASE}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ task_type: taskType, prompt })
        });
        const data = await res.json();
        responseBox.textContent = JSON.stringify(data, null, 2);
        await loadRuns();
      } catch (err) {
        responseBox.textContent = `ERROR: ${err}`;
      }
    }

    async function loadRuns() {
      const runsBox = document.getElementById("runsBox");
      runsBox.textContent = "加载中...";
      try {
        const res = await fetch(`${EVAL_BASE}/task-runs`);
        const data = await res.json();
        runsBox.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        runsBox.textContent = `ERROR: ${err}`;
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendAsk);
    document.getElementById("refreshRunsBtn").addEventListener("click", loadRuns);

    loadRuns();
  </script>
</body>
</html>
