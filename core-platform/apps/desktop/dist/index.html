function newSession() {
  const s = {
    id: "session_" + Date.now(),
    title: "新建会话",
    messages: [],
    runs: [],
    createdAt: Date.now()
  };
  state.sessions.unshift(s);
  state.current = s.id;
  saveState();
  render();
}
function systemMessage(text) {
  const s = currentSession();
  s.messages.push({ role: "assistant", text, ts: Date.now() });
  saveState();
  render();
}
function userMessage(text) {
  const s = currentSession();
  s.messages.push({ role: "user", text, ts: Date.now() });
  if (s.title === "新建会话") s.title = text.slice(0, 18);
  saveState();
  render();
}
function addRun(run) {
  currentSession().runs.push({ id: "run_" + Date.now(), ts: Date.now(), ...run });
  saveState();
  render();
}
function patchLastRun(patch) {
  const r = currentSession().runs.at(-1);
  if (r) Object.assign(r, patch);
  saveState();
  render();
}
function patchRunById(runId, patch) {
  const s = currentSession();
  const r = s.runs.find(x => x.id === runId);
  if (r) Object.assign(r, patch);
  saveState();
  render();
}
function getRunLog(runId) {
  const s = currentSession();
  const r = s.runs.find(x => x.id === runId);
  return r ? (r.log || "") : "";
}

function renderSessions() {

    b.className = "session-btn" + (s.id === state.current ? " active" : "");

function renderRun(r) {
  const card = document.createElement("div");
  card.className = "task-card";
  const steps = r.steps || [];
  card.innerHTML = `
    <div class="task-head">
      <div class="task-title">${escapeHtml(r.title || "Runtime Task")}</div>
      <div class="status ${r.status || "running"}">${r.status || "running"}</div>
    </div>
    <div class="steps">
      ${steps.map(x => `<div class="step ${x.ok ? "ok" : x.warn ? "warn" : ""}">${escapeHtml(x.text)}</div>`).join("")}
    </div>
    <div class="terminal">${escapeHtml(r.log || "")}</div>
    <div class="task-actions">
      <button class="btn-soft" onclick="copyRun('${r.id}')">复制日志</button>
      <button class="btn-soft" onclick="retryRun('${r.id}')">重试</button>
      ${r.trace_id ? `<button class="btn-soft" onclick="load追踪('${r.trace_id}')">查看 追踪</button>` : ""}
    </div>
  `;
  return card;
}
async function runRealExecution(ctx) {
  const runId = ctx.run_id || currentSession().runs.at(-1)?.id;
  try {
    patchRunById(runId, {
      status: "running",
      steps: [
        { text: "1. dry-run 完成", ok: true },
        { text: "2. 策略 允许或人工批准", ok: true },
        { text: "3. 真实执行中" }
      ],
      log: (getRunLog(runId) || "") + "

REAL EXECUTE REQUEST..."
    });
    const real = await postJson(`${API.runtime}/execute`, {
      repo: ctx.task_type || "general",
      prompt: ctx.prompt,
      dry_run: false,
      metadata: {
        session_id: currentSession().id,
        shared_learning: true,
        approved: true,
        source: "maomiai_desktop_p3_14_b"
      }
    });
    const mergedLog = [
      getRunLog(runId) || "",
      "",
      "REAL EXECUTE RESULT:",
      JSON.stringify(real, null, 2)
    ].join("
");
    patchRunById(runId, {
      status: real.ok === false ? "error" : "done",
      steps: [
        { text: "1. dry-run 完成", ok: true },
        { text: "2. 策略 允许或人工批准", ok: true },
        { text: "3. 真实执行完成", ok: real.ok !== false },
        { text: "4. 结果已写入任务卡", ok: true }
      ],
      trace_id: real.trace_id || real.result?.trace_id || ctx.dry?.trace_id,
      policy: real.policy || real.result?.policy || ctx.dry?.policy,
      result: real,
      log: mergedLog
    });
    if (real.trace_id || real.result?.trace_id || ctx.dry?.trace_id) {
      document.getElementById("traceBox").textContent = real.trace_id || real.result?.trace_id || ctx.dry?.trace_id;
    }
    if (real.policy || real.result?.policy || ctx.dry?.policy) {
      document.getElementById("policyBox").textContent = JSON.stringify(real.policy || real.result?.policy || ctx.dry?.policy, null, 2);
    }
    update预览FromResult(real);
    const artifact = await registerArtifactFromResult(ctx, real);
    if (artifact) {
      patchRunById(runId, {
        artifact_id: artifact.id,
        log: (getRunLog(runId) || "") + "\n\nARTIFACT REGISTERED:\n" + JSON.stringify(artifact, null, 2)
      });
      await loadArtifacts();
    }
    systemMessage("真实执行已完成，结果已写入任务卡，并已登记为产物。");
  } catch (e) {
    patchRunById(runId, {
      status: "error",
      steps: [
        { text: "1. dry-run 完成", ok: true },
        { text: "2. 策略 允许或人工批准", ok: true },
        { text: "3. 真实执行失败", warn: true }
      ],
      log: (getRunLog(runId) || "") + "

REAL EXECUTE ERROR: " + (e.message || String(e))
    });
  }
}
async function submitTask() {
  const input = document.getElementById("prompt");
  const prompt = input.value.trim();
  if (!prompt) return;
  input.value = "";
  userMessage(prompt);
  addRun({
    title: "P3 Runtime Task",
    status: "running",
    steps: [
      { text: "1. 接收任务", ok: true },
      { text: "2. 调用 Auto Router / Capability Learning" }
    ],
    log: "任务已进入 P3 执行链路..."
  });
  try {
    const route = await postJson(`${API.router}/route`, { prompt });
    patchLastRun({
      steps: [
        { text: "1. 接收任务", ok: true },
        { text: "2. 能力路由完成", ok: true },
        { text: "3. Runtime dry-run" }
      ],
      log: "ROUTE:\n" + JSON.stringify(route, null, 2)
    });
    const dry = await postJson(`${API.runtime}/execute`, {
      repo: route.task_type || "general",
      prompt,
      dry_run: true,
      metadata: { session_id: currentSession().id, shared_learning: true }
    });
    patchLastRun({
      status: dry.requires_review ? "review" : "done",
      steps: [
        { text: "1. 接收任务", ok: true },
        { text: "2. 能力路由完成", ok: true },
        { text: "3. Runtime dry-run 完成", ok: true },
        { text: dry.requires_review ? "4. 需要人工审核" : "4. 可安全继续", ok: !dry.requires_review, warn: !!dry.requires_review }
      ],
      trace_id: dry.trace_id,
      policy: dry.policy,
      log: "ROUTE:\n" + JSON.stringify(route, null, 2) + "\n\nRUNTIME:\n" + JSON.stringify(dry, null, 2)
    });
    if (dry.trace_id) document.getElementById("traceBox").textContent = dry.trace_id;
    if (dry.policy) document.getElementById("policyBox").textContent = JSON.stringify(dry.policy, null, 2);
    if (dry.requires_review) {
      currentReview = {
        prompt,
        route,
        dry,
        task_type: route.task_type || "general"
      };
      const lastRun = currentSession().runs.at(-1);
      currentReviewRunId = lastRun ? lastRun.id : null;
      document.getElementById("reviewJson").textContent = JSON.stringify(dry, null, 2);
      document.getElementById("reviewModal").classList.add("show");
    } else {
      // 如果 policy 允许，直接执行真实执行链路
      await runRealExecution({
        prompt,
        route,
        dry,
        task_type: route.task_type || "general",
        run_id: currentSession().runs.at(-1)?.id
      });
    }
  } catch (e) {
    patchLastRun({
      status: "error",
      log: "ERROR: " + (e.message || String(e))
    });
  }
}

  patchRunById(currentReviewRunId, {

      { text: "1. dry-run 已完成", ok: true },
      { text: "2. 人工审核已拒绝", warn: true }
    ],

  });

async function approveReview() {
  if (!currentReview) {
    closeReview();
    return;
  }
  closeReview();
  patchRunById(currentReviewRunId, {
    status: "running",
    steps: [
      { text: "1. dry-run 已完成", ok: true },
      { text: "2. 人工审核已批准", ok: true },
      { text: "3. 开始真实执行" }
    ],
    log: (getRunLog(currentReviewRunId) || "") + "

人工审核：已批准，开始真实执行..."
  });
  await runRealExecution({
    prompt: currentReview.prompt,
    route: currentReview.route,
    dry: currentReview.dry,
    task_type: currentReview.task_type,
    run_id: currentReviewRunId
  });
  currentReview = null;
  currentReviewRunId = null;
}
async function retryRun(id) {
  const s = currentSession();
  const r = s.runs.find(x => x.id === id);
  if (!r) return;
  const lastUser = [...s.messages].reverse().find(x => x.role === "user");
  if (!lastUser) {
    systemMessage("无法重试：没有找到原始用户任务。");
    return;
  }
  patchRunById(id, {
    status: "running",
    steps: [{ text: "重新执行任务", ok: true }],
    log: (r.log || "") + "

RETRY REQUEST..."
  });
  document.getElementById("prompt").value = lastUser.text;
  await submitTask();
}

function format追踪Timeline(json) {
  try {
    const events = json.events || json.items || json.timeline || [];
    if (Array.isArray(events) && events.length) {
      return events.map((e, i) => {
        return `${i + 1}. ${e.type || e.event || "event"}\\n   ${JSON.stringify(e, null, 2)}`;
      }).join("\\n\\n");
    }
  } catch (_) {}
  return JSON.stringify(json, null, 2);
}

  const results = json.results || json.items || [];
  if (Array.isArray(results) && results.length) {
    return results.map((r, i) => {
      const ok = r.ok === true || r.passed === true || r.status === "pass";
      return `${ok ? "✓" : "✗"} ${r.name || r.case || ("case_" + i)}\\n${JSON.stringify(r, null, 2)}`;
    }).join("\\n\\n");
  }
  return JSON.stringify(json, null, 2);
}

async function ingestDocument() {
  const path = document.getElementById("docPath").value.trim();
  const text = document.getElementById("docText").value.trim();
  const progressBox = document.getElementById("ingestProgress");
  const resultBox = document.getElementById("docResult");
  
  if (!path && !text) {
    progressBox.textContent = "请输入文件路径或文本内容";
    return;
  }
  
  progressBox.textContent = "ingesting...";
  resultBox.textContent = "";
  
  try {
    let json;
    
    if (text) {
      // 暂时使用/ingest端点，将文本作为临时文件
      // 后续可以添加专门的文本端点或FormData
      progressBox.textContent = "文本摄取暂未完全实现，请使用文件路径";
      return;
    } else {
      // 文件摄取需要FormData，暂时用路径
      progressBox.textContent = "文件摄取需要Tauri文件选择器，暂未实现";
      return;
    }
    
    progressBox.textContent = "✅ 摄取完成";
    resultBox.textContent = JSON.stringify(json, null, 2);
    
    if (json.chunks && json.chunks.length > 0) {
      renderChunks(json.chunks);
    }
    
    systemMessage("文档摄取成功：" + (json.document_id || json.chunks?.length + " chunks"));
    loadRecentDocuments();
  } catch (e) {
    progressBox.textContent = "❌ 摄取失败";
    resultBox.textContent = "ingest failed: " + e.message;
    systemMessage("文档摄取失败：" + e.message);
  }
}
async function showCachedDoc(docId) {
  try {
    const res = await fetch(`${API.doc}/cache/${docId}?format=markdown`, { signal: AbortSignal.timeout(5000) });
    const json = await res.json();
    const content = json.content || json.markdown || json.text || "";
    if (json.chunks && json.chunks.length > 0) {
      renderChunks(json.chunks);
      systemMessage("加载了 " + json.chunks.length + " 个分块");
    } else {
      renderChunks([{content: content, metadata: {type: "text"}}]);
      systemMessage("加载了文档内容");
    }
  } catch (e) {
    systemMessage("加载缓存失败：" + e.message);
  }
}
async function loadRecentDocuments() {
  const box = document.getElementById("docResult");
  if (!box) return;
  box.textContent = "loading...";
  try {
    const res = await fetch(`${API.doc}/recent?limit=10`, { signal: AbortSignal.timeout(5000) });
    const json = await res.json();
    const records = json.records || [];
    if (records.length === 0) {
      box.textContent = "暂无摄取记录";
      return;
    }
    box.innerHTML = records.map((rec, idx) => {
      const doc = rec.document || rec;
      const chunks = doc.chunks || doc.chunk_count || rec.chunks?.length || 0;
      const name = doc.filename || doc.name || doc.path || ("doc_" + idx);
      return `
      <div class="mini-card">
        <b>${escapeHtml(name)}</b><br/>
        <span class="mono">id: ${escapeHtml(doc.document_id || rec.doc_id || "")}</span><br/>
        <span class="badge">${chunks} chunks</span>
        ${doc.status ? `<span class="badge" style="background:#16a34a;color:#fff;">${doc.status}</span>` : ""}
        <button class="btn-soft" style="margin-top:8px;" onclick="showCachedDoc('${doc.document_id || rec.doc_id || ""}')">查看缓存</button>
      </div>
    `}).join("");
  } catch (e) {
    box.textContent = "load recent docs failed: " + e.message;
  }
}
async function showDocChunks(docId) {
  try {
    const res = await fetch(`${API.doc}/document/${docId}/chunks`, { signal: AbortSignal.timeout(5000) });
    const json = await res.json();
    const chunks = json.chunks || json.items || [];
    if (chunks.length > 0) {
      renderChunks(chunks);
      systemMessage("加载了 " + chunks.length + " 个分块");
    } else {
      systemMessage("该文档暂无分块");
    }
  } catch (e) {
    systemMessage("加载分块失败：" + e.message);
  }
}
function renderChunks(chunks) {
  const box = document.getElementById("chunkList");
  if (!box) return;
  box.innerHTML = chunks.map((chunk, idx) => `
    <div class="mini-card">
      <b>Chunk #${idx + 1}</b><br/>
      <span class="mono">length: ${chunk.content?.length || chunk.text?.length || 0}</span><br/>
      <span class="badge">${chunk.metadata?.type || "text"}</span>
      <div style="margin-top:8px;max-height:120px;overflow:auto;" class="mono">${escapeHtml(chunk.content || chunk.text || "")}</div>
    </div>
  `).join("");
}

async function postJson(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body),
    signal: AbortSignal.timeout(60000)
  });
  if (!res.ok) throw new Error(`${url} failed: ${res.status}`);
  return await res.json();
}
