name: build-win-release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. win-test-20260419"
        required: true
        default: "win-test-manual"
  push:
    branches: ["main"]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: apps/desktop
        shell: pwsh
        run: |
          if (Test-Path package-lock.json) {
            npm ci
          } elseif (Test-Path pnpm-lock.yaml) {
            npm install -g pnpm
            pnpm install --frozen-lockfile
          } else {
            npm install
          }

      - name: Build Tauri Windows bundle
        working-directory: apps/desktop
        shell: pwsh
        run: |
          if (Test-Path package-lock.json) {
            npm run tauri build || cargo build --manifest-path src-tauri/Cargo.toml -vv || cargo build --manifest-path src-tauri/Cargo.toml -vv
          } elseif (Test-Path pnpm-lock.yaml) {
            pnpm tauri build
          } else {
            npm run tauri build || cargo build --manifest-path src-tauri/Cargo.toml -vv || cargo build --manifest-path src-tauri/Cargo.toml -vv
          }

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-win | Out-Null
          $paths = @(
            "apps/desktop/src-tauri/target/release/bundle/msi/*.msi",
            "apps/desktop/src-tauri/target/release/bundle/nsis/*.exe",
            "apps/desktop/src-tauri/target/release/*.exe"
          )
          foreach ($p in $paths) {
            Get-ChildItem $p -ErrorAction SilentlyContinue | Copy-Item -Destination dist-win -Force
          }
          Get-ChildItem dist-win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-ai-platform-win
          path: dist-win/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: dist-win/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
